<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="rcBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="rcGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCD34D"/>
      <stop offset="0.5" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="rcGoldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="rcRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EF4444"/>
      <stop offset="1" stop-color="#B91C1C"/>
    </linearGradient>
    <radialGradient id="rcLogoShine" cx="0.28" cy="0.25" r="0.55">
      <stop offset="0" stop-color="#FFF0B4" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFF0B4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rcGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FBBF24" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="250" rx="14" fill="url(#rcBg)" stroke="#FBBF24" stroke-opacity="0.3" stroke-width="1"/>
  <ellipse cx="80" cy="60" rx="120" ry="80" fill="url(#rcGlow)"/>
  <ellipse cx="240" cy="200" rx="100" ry="70" fill="url(#rcGlow)"/>

  <!-- Decorative chess pieces -->
  <g font-family="Georgia, serif" font-weight="bold" fill="#FBBF24" opacity="0.06">
    <text x="20" y="80" font-size="56" transform="rotate(-12 40 80)">♚</text>
    <text x="240" y="100" font-size="50" transform="rotate(15 260 100)">♞</text>
  </g>

  <!-- Logo (matches website: gold gradient + white ♛ + shine) -->
  <g transform="translate(18, 18)">
    <rect width="48" height="48" rx="12" fill="url(#rcGold)" stroke="#B45309" stroke-width="1.5"/>
    <rect width="48" height="48" rx="12" fill="url(#rcLogoShine)"/>
    <text x="24" y="36" font-family="'Prompt','Sarabun',Georgia,serif" font-size="30" font-weight="900" fill="#FFFFFF" text-anchor="middle">♛</text>
    <rect x="3" y="3" width="42" height="42" rx="9" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>
  </g>
  <text x="76" y="38" font-family="'Prompt','Sarabun',sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Playmakruk.com</text>
  <text x="76" y="56" font-family="'Prompt','Sarabun',sans-serif" font-size="10" fill="#94A3B8">หมากรุก / หมากฮอส ออนไลน์</text>

  <!-- NEW burst badge — moved DOWN to clear brand text; smaller; text centered -->
  <g transform="translate(262, 84) rotate(-12)">
    <!-- 16-point starburst, outer 30 / inner 23 -->
    <path d="M0,-30 L5.4,-21.8 L14.6,-26.8 L13.2,-16.8 L23.4,-15.7 L16.8,-8.2 L23.9,-0.7 L14.6,2.1 L17.1,11.4 L7.9,8.6 L5.4,17.9 L0,10.7 L-5.4,17.9 L-7.9,8.6 L-17.1,11.4 L-14.6,2.1 L-23.9,-0.7 L-16.8,-8.2 L-23.4,-15.7 L-13.2,-16.8 L-14.6,-26.8 L-5.4,-21.8 Z" fill="url(#rcRed)" stroke="#FEF3C7" stroke-width="1.2"/>
    <text x="0" y="-3" font-family="'Prompt','Sarabun',sans-serif" font-size="7" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">NEW</text>
    <text x="0" y="9" font-family="'Prompt','Sarabun',sans-serif" font-size="9" font-weight="900" fill="#FDE68A" text-anchor="middle" letter-spacing="0.2">AI BOT</text>
  </g>

  <!-- Robot + AI BOT headline -->
  <g transform="translate(28, 90)">
    <!-- Mini robot -->
    <g transform="translate(0, 4)">
      <line x1="22" y1="0" x2="22" y2="8" stroke="url(#rcGold)" stroke-width="2.5"/>
      <circle cx="22" cy="3" r="3.5" fill="url(#rcGold)"/>
      <rect x="2" y="10" width="40" height="36" rx="7" fill="url(#rcGold)" stroke="#FEF3C7" stroke-width="1.5"/>
      <circle cx="13" cy="25" r="4.5" fill="#0F172A"/>
      <circle cx="31" cy="25" r="4.5" fill="#0F172A"/>
      <circle cx="13.5" cy="24" r="1.5" fill="#FCD34D"/>
      <circle cx="31.5" cy="24" r="1.5" fill="#FCD34D"/>
      <rect x="16" y="36" width="12" height="3" rx="1.2" fill="#0F172A"/>
    </g>
    <text x="58" y="32" font-family="'Prompt','Sarabun',sans-serif" font-size="32" font-weight="900" fill="url(#rcGoldText)">AI BOT</text>
    <text x="58" y="48" font-family="'Prompt','Sarabun',sans-serif" font-size="11" font-weight="500" fill="#CBD5E1">3 ระดับ • หรือเล่นกับเพื่อน</text>
  </g>

  <!-- Pills: 2 rows × 3 cols, equal width 84px, 8px gap, centered -->
  <g font-family="'Prompt','Sarabun',sans-serif" font-size="9" font-weight="600">
    <!-- Row 1: 4 game pills shrunk to 2x2 layout for balance -->
    <g transform="translate(18, 158)">
      <rect width="132" height="22" rx="11" fill="rgba(251,191,36,0.12)" stroke="#FBBF24" stroke-width="0.8"/>
      <text x="66" y="14.5" fill="#FBBF24" text-anchor="middle">♛ หมากรุกไทย</text>
    </g>
    <g transform="translate(154, 158)">
      <rect width="132" height="22" rx="11" fill="rgba(251,191,36,0.12)" stroke="#FBBF24" stroke-width="0.8"/>
      <text x="66" y="14.5" fill="#FBBF24" text-anchor="middle">♚ หมากรุกสากล</text>
    </g>
    <g transform="translate(18, 184)">
      <rect width="132" height="22" rx="11" fill="rgba(251,191,36,0.12)" stroke="#FBBF24" stroke-width="0.8"/>
      <text x="66" y="14.5" fill="#FBBF24" text-anchor="middle">● หมากฮอสไทย</text>
    </g>
    <g transform="translate(154, 184)">
      <rect width="132" height="22" rx="11" fill="rgba(251,191,36,0.12)" stroke="#FBBF24" stroke-width="0.8"/>
      <text x="66" y="14.5" fill="#FBBF24" text-anchor="middle">● หมากฮอสสากล</text>
    </g>
  </g>

  <!-- CTA button (no blur filter on text — flat shadow rect for depth) -->
  <g transform="translate(60, 215)">
    <rect x="-1" y="2" width="182" height="28" rx="14" fill="#000000" opacity="0.4"/>
    <rect width="180" height="28" rx="14" fill="url(#rcGold)" stroke="#B45309" stroke-width="1"/>
    <text x="90" y="19" font-family="'Prompt','Sarabun',sans-serif" font-size="13" font-weight="800" fill="#0F172A" text-anchor="middle">เข้าเล่นเลย ▶</text>
  </g>
</svg>
