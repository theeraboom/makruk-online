<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="arbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFCF6"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <linearGradient id="artitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <radialGradient id="arglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <filter id="arshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#5C4A36" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="300" height="250" rx="10" fill="url(#arbg)" stroke="#E5E1D5" stroke-width="1"/>
  <circle cx="50" cy="40" r="80" fill="url(#arglow)"/>
  <circle cx="270" cy="220" r="80" fill="url(#arglow)"/>

  <g font-family="Georgia, serif" font-weight="bold" fill="#B45309" opacity="0.07">
    <text x="20" y="60" font-size="44" transform="rotate(-12 40 60)">♚</text>
    <text x="240" y="80" font-size="40" transform="rotate(15 260 80)">⛁</text>
    <text x="220" y="220" font-size="48" transform="rotate(-8 240 220)">♛</text>
    <text x="30" y="230" font-size="36" transform="rotate(20 50 230)">⛂</text>
  </g>

  <g transform="translate(120, 22)">
    <rect width="60" height="60" rx="14" fill="#B45309"/>
    <text x="30" y="46" font-family="Georgia, serif" font-size="40" font-weight="bold" fill="#FFFFFF" text-anchor="middle">♛</text>
  </g>

  <text x="150" y="108" font-family="'Sarabun', sans-serif" font-size="22" font-weight="700" fill="url(#artitle)" text-anchor="middle">Playmakruk.com</text>

  <text x="150" y="135" font-family="'Sarabun', sans-serif" font-size="14" font-weight="600" fill="#18181B" text-anchor="middle">หมากรุก / หมากฮอส ออนไลน์</text>
  <text x="150" y="153" font-family="'Sarabun', sans-serif" font-size="12" fill="#52525B" text-anchor="middle">นั่งเล่น ยืนดู คุยกันสนุกๆ</text>

  <g font-family="'Sarabun', sans-serif" font-size="11" font-weight="500">
    <g transform="translate(40, 170)">
      <rect width="90" height="26" rx="13" fill="#FFFFFF" stroke="#E5E1D5" stroke-width="1"/>
      <text x="45" y="18" text-anchor="middle" fill="#18181B">★ ฟรี</text>
    </g>
    <g transform="translate(170, 170)">
      <rect width="90" height="26" rx="13" fill="#FFFFFF" stroke="#E5E1D5" stroke-width="1"/>
      <text x="45" y="18" text-anchor="middle" fill="#18181B">★ ไม่ต้องสมัคร</text>
    </g>
  </g>

  <g transform="translate(70, 208)" filter="url(#arshadow)">
    <rect width="160" height="32" rx="16" fill="#B45309"/>
    <text x="80" y="21" font-family="'Sarabun', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">เข้าเล่นเลย →</text>
  </g>
</svg>
