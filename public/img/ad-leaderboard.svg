    </linearGradient>
    <radialGradient id="adlglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="728" height="90" rx="8" fill="url(#adlbg)" stroke="#E5E1D5" stroke-width="1"/>
  <circle cx="60" cy="45" r="60" fill="url(#adlglow)"/>

  <g font-family="Georgia, serif" font-weight="bold" fill="#B45309" opacity="0.07">
